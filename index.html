<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>NEET 36-Day Pro Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050507;
  --tx: #f4f4f8;
  --mu: #8a8a9d;
  --glass-bg: rgba(20, 20, 28, 0.6);
  --glass-border: rgba(255, 255, 255, 0.05);
  --panel: #111116;
  --tb: rgba(255, 255, 255, 0.08);
  --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.6);
  
  --gold: #facc15;
  --pink: #ff2a5f;
  --cyan: #00d0f4;
  --green: #00d26a;
  --pu: #b058e8;
  --or: #ff8800;
  --safe: env(safe-area-inset-bottom);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100vw;height:100dvh;overflow:hidden;font-family:'Syne',sans-serif;-webkit-font-smoothing:antialiased;background-color:var(--bg);color:var(--tx);user-select:none;}
::-webkit-scrollbar{display:none;}*{scrollbar-width:none;}

.bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none; background: #050507;}
.bg::before,.bg::after,.bg-blob-3{content:'';position:absolute;border-radius:50%;filter:blur(100px);animation:floatBg 30s infinite alternate cubic-bezier(.4,0,.2,1); opacity:0.12;}
.bg::before{width:80vw;height:80vw;background:var(--cyan);top:-10%;left:-20%;}
.bg::after{width:90vw;height:90vw;background:var(--or);bottom:-10%;right:-20%;animation-delay:-5s;}
.bg-blob-3{width:70vw;height:70vw;background:var(--pu);top:30%;left:20%;animation-duration:40s;}
@keyframes floatBg{0%{transform:translate(0,0) scale(1);}100%{transform:translate(20vw,20vh) scale(1.3);}}

.app{position:relative;z-index:1;width:100%;max-width:440px;height:100dvh;margin:0 auto;display:block;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;}
@media(min-width:441px){.app{border-left:1px solid var(--tb);border-right:1px solid var(--tb);box-shadow:var(--shadow-lg);}}

.vc{display:block;padding:max(16px, env(safe-area-inset-top)) 10px calc(90px + var(--safe));}
.view{display:none;animation:vIn .4s cubic-bezier(.16,1,.3,1) forwards; opacity:0; transform:translateY(15px);}
.view.active{display:block;}
@keyframes vIn{to{opacity:1;transform:none;}}

.glass-card{background:var(--glass-bg);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid var(--glass-border);border-radius:24px;box-shadow:var(--shadow-lg);margin-bottom:16px;}

.pro-dashboard { 
  padding: 16px 10px;
  display: flex;
  flex-direction: row;        
  align-items: center;
  justify-content: space-around;
  gap: 0;
}

.ring-col { display: flex; flex-direction: column; align-items: center; justify-content: center;}
.ring-label { margin-top: 20px; font-size: 0.85rem; font-weight: 800; letter-spacing: 2.5px; color: var(--mu); text-transform: uppercase; }

.dash-svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); overflow: visible; }
.ring-track { fill: none; stroke: var(--tb); stroke-width: 8; }
.ring-prog { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.8s cubic-bezier(.16,1,.3,1); }

.center-display { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; text-align: center;}
.cd-val { font-size: 2.2rem; font-family: 'JetBrains Mono', monospace; font-weight: 800; line-height: 1; letter-spacing: -1.5px;}

/* DISTINCT NO-GLOW, NON-REPEATING GRADIENTS FOR INTERNAL DATA */
.val-gradient-week { 
  background: linear-gradient(135deg, #e0f2fe, #ffffff);
  -webkit-background-clip: text; 
  -webkit-text-fill-color: transparent;
  color: transparent; 
}
.val-gradient-today { 
  background: linear-gradient(90deg, #fef3c7, #ffffff);
  -webkit-background-clip: text; 
  -webkit-text-fill-color: transparent;
  color: transparent; 
}

.day-node { position: absolute; width: 26px; height: 26px; border-radius: 50%; background: var(--panel); border: 2px solid var(--tb); display: flex; flex-direction: column; align-items: center; justify-content: center; transform: translate(-50%, -50%); z-index: 10; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
.day-node .date-val { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; font-weight: 800; color: var(--mu); }
.day-node .day-out { position: absolute; font-family: 'Syne', sans-serif; font-size: 0.65rem; font-weight: 800; color: var(--mu); }
.day-node.active { background: var(--tx); border-color: var(--cyan); transform: translate(-50%, -50%) scale(1.15); z-index: 11; }
.day-node.active .date-val { color: var(--bg); }
.day-node.active .day-out { color: var(--cyan); }
.day-node.done { background: var(--green); border-color: var(--green); }
.day-node.done .date-val { color: #fff; }

.sh { font-size: 0.8rem; font-weight: 800; color: var(--tx); margin: 24px 0 14px; letter-spacing: 1.5px; text-transform: uppercase; padding-left: 6px; display: flex; align-items: center; gap: 8px;}
.sh::before { content: ''; display: block; width: 5px; height: 16px; background: var(--cyan); border-radius: 4px; }

.workout-card { display: flex; flex-direction: column; align-items: stretch; border-radius: 20px; padding: 16px 12px; margin-bottom: 14px; position: relative; transition: all .2s ease; border-left: 6px solid transparent; background: var(--panel); border: 1px solid var(--tb); border-left-width: 6px; box-shadow: var(--shadow-lg); overflow: hidden;}
.workout-card::before { content:''; position:absolute; inset:0; background: linear-gradient(135deg, rgba(255,255,255,0.03), transparent); pointer-events: none; }
.workout-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
.workout-card.theme-math { border-left-color: var(--pu); }
.workout-card.theme-phy { border-left-color: var(--or); }
.workout-card.theme-che { border-left-color: var(--cyan); }
.workout-card.theme-bio { border-left-color: var(--green); }
.workout-card.done { opacity: .5; filter: grayscale(50%); border-left-color: var(--green)!important; background: var(--bg); }

.wc-header { display: flex; align-items: center; justify-content: space-between; width: 100%; cursor: pointer; position: relative; z-index: 2;}
.wc-header-left { display: flex; align-items: center; gap: 10px; }
.wc-tag-badge { font-size: 0.8rem; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; background: var(--bg); border: 1px solid var(--tb); color: var(--tx); padding: 8px 16px; border-radius: 12px; }
.wc-body { display: none; padding-top: 12px; margin-top: 14px; border-top: 1px solid var(--tb); animation: vIn 0.2s ease-out; position: relative; z-index: 2;}
.workout-card.open .wc-body { display: block; }

.pro-checkbox { flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--mu); background: var(--bg); display: flex; align-items: center; justify-content: center; transition: all .3s cubic-bezier(.16,1,.3,1); cursor:pointer;}
.pro-checkbox svg { width: 16px; height: 16px; stroke-width: 4; stroke: #fff; transform: scale(0); transition: .3s cubic-bezier(.34,1.56,.64,1); }
.workout-card.done .pro-checkbox { background: var(--green); border-color: var(--green); }
.workout-card.done .pro-checkbox svg { transform: scale(1); }

.data-box { font-size: 0.85rem; line-height: 1.4; background: rgba(0,0,0,0.3); padding: 16px; border-radius: 14px; border: 1px solid var(--tb); }
.data-lbl { font-size: 0.65rem; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin-bottom: 6px; }
.data-val { margin-bottom: 16px; color: var(--tx); font-weight: 700;}
.data-val:last-child { margin-bottom: 0; }

.dim-input { background: var(--panel); border: 1px solid var(--mu); color: var(--cyan); border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; width: 120px; margin-left: 8px; display: inline-block; font-family: 'JetBrains Mono', monospace; transition: 0.2s; font-weight:800; text-align: center;}
.dim-input:focus { outline: none; border-color: var(--or); box-shadow: 0 0 10px rgba(255, 136, 0, 0.2); }
.workout-card.done .dim-input { opacity: 0.6; pointer-events: none; }

#dmsg{display:none;text-align:center;padding:30px;}
.dtl{font-size:1.4rem;font-weight:800;margin:12px 0 6px;}
.ds{font-size:.9rem;color:var(--mu);font-weight:600;}

/* Tiny Beautiful Navigation Pill */
.bnav {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  width: auto;
  min-width: 140px;
  background: rgba(20, 20, 28, 0.7);
  border: 1px solid rgba(255, 255, 255, 0.08);
  display: flex;
  padding: 6px;
  gap: 8px;
  border-radius: 100px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
  z-index: 100;
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  justify-content: center;
}
.bb {
  width: 44px;
  height: 44px;
  background: transparent;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--mu);
  cursor: pointer;
  transition: all .3s cubic-bezier(.16,1,.3,1);
  border-radius: 50%;
}
.bb.active {
  background: linear-gradient(135deg, var(--cyan), var(--pu));
  color: #fff;
  transform: scale(1.05);
}
.bb svg {
  width: 20px;
  height: 20px;
  stroke: currentColor;
  stroke-width: 2.5;
  fill: none;
  transition: .2s;
}

.prog-hero-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;}
.prog-hero-pct{font-family:'JetBrains Mono',monospace;font-size:2.5rem;font-weight:800;line-height:1;letter-spacing:-1px;background:linear-gradient(90deg,var(--cyan),var(--green));-webkit-background-clip:text;color:transparent;}
.prog-hero-meta{text-align:right;}
.prog-hero-days{font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:800;}
.prog-hero-lbl{font-size:.5rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);margin-top:4px;}
.prog-bar-wrap{height:8px;background:var(--tb);border-radius:8px;overflow:hidden;}
.prog-bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--cyan),var(--green));width:0%;transition:width 1s cubic-bezier(.16,1,.3,1);}

.subj-rings{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.subj-ring-card{display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 12px;border-radius:20px;background:var(--panel);border:1px solid var(--tb);box-shadow:var(--shadow-lg);}
.prog-ring-svg{overflow:visible;}
.prog-ring-track{fill:none;stroke:var(--bg);stroke-width:6;}
.prog-ring-arc{fill:none;stroke-linecap:round;stroke-width:6;stroke-dasharray:226.19;stroke-dashoffset:226.19;transform:rotate(-90deg);transform-origin:40px 40px;transition:stroke-dashoffset 1s cubic-bezier(.16,1,.3,1);}
.prog-ring-pct{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:800;text-anchor:middle;dominant-baseline:central;fill:var(--tx);letter-spacing:-.5px;}
.prog-ring-sub{font-family:'Syne',sans-serif;font-size:.35rem;font-weight:800;text-anchor:middle;dominant-baseline:central;letter-spacing:.5px;fill:var(--mu);}
.subj-ring-name{font-size:.65rem;font-weight:800;color:var(--tx);text-transform:uppercase;letter-spacing:1px;}
.subj-ring-icon{font-size:1.4rem;}

.plan-section{margin-top:4px;}
.plan-day-card{border-radius:16px;margin-bottom:12px;background:var(--panel);border:1px solid var(--tb);overflow:hidden;transition:.2s;}
.plan-day-card.completed{border-color:rgba(0,210,106,.3);background:rgba(0,210,106,.05);}
.plan-day-card.today-card{border:2px solid var(--cyan);box-shadow:0 0 10px rgba(0,208,244,.15);}
.plan-day-header{display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer;}
.plan-day-num{font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:800;background:var(--tx);color:var(--bg);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.plan-day-card.completed .plan-day-num{background:var(--green); color:#fff;}
.plan-day-card.today-card .plan-day-num{background:var(--cyan);color:#fff;}
.plan-day-title{flex:1;font-size:.85rem;font-weight:800;color:var(--tx);}
.plan-day-meta{font-size:.6rem;color:var(--mu);font-weight:700;margin-top:4px;}
.plan-day-chevron{color:var(--mu);transition:transform .3s;flex-shrink:0;}
.plan-day-card.open .plan-day-chevron{transform:rotate(180deg);}
.plan-day-body{display:none;padding:0 16px 16px;}
.plan-day-card.open .plan-day-body{display:block;}
.plan-subject-row{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--tb);}
.plan-subject-row:last-child{border-bottom:none;}
.plan-subj-badge{flex-shrink:0;font-size:.5rem;font-weight:800;padding:6px 10px;border-radius:6px;text-transform:uppercase;margin-top:1px;}
.badge-math{color:var(--pu);background:rgba(176,88,232,.15);}
.badge-phy{color:var(--or);background:rgba(255,136,0,.15);}
.badge-che{color:var(--cyan);background:rgba(0,208,244,.15);}
.badge-bio{color:var(--green);background:rgba(0,210,106,.15);}
.plan-subj-text{font-size:.75rem;color:var(--tx);font-weight:600;line-height:1.4;flex:1;}
</style>
</head>
<body>
<div class="bg"><div class="bg-blob-3"></div></div>
<div class="app" id="mainAppScroll">

  <div class="vc">
    <!-- TODAY TAB -->
    <div class="view active" id="vT">
      
      <!-- PRO HORIZONTAL DASHBOARD -->
      <div class="pro-dashboard glass-card">
        
        <!-- LEFT: Week ring with STREAK inside -->
        <div class="ring-col">
          <div style="width:140px; height:140px; position:relative;">
            <svg viewBox="0 0 140 140" class="dash-svg">
              <defs>
                <!-- VISIBLY CHANGING GRADIENT - NO GLOW -->
                <linearGradient id="wkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%">
                    <animate attributeName="stop-color" values="#facc15; #ff2a5f; #ff8800; #facc15" dur="3s" repeatCount="indefinite" />
                  </stop>
                  <stop offset="100%">
                    <animate attributeName="stop-color" values="#ff8800; #b058e8; #facc15; #ff8800" dur="3s" repeatCount="indefinite" />
                  </stop>
                </linearGradient>
              </defs>
              <circle cx="70" cy="70" r="54" class="ring-track"/>
              <circle cx="70" cy="70" r="54" class="ring-prog" id="wkProgSvg" stroke="url(#wkGrad)" stroke-dasharray="339.29" stroke-dashoffset="339.29"/>
            </svg>
            <div id="weekNodesEl"></div>
            <!-- STREAK COUNTER (Clean Ice/White Gradient) -->
            <div class="center-display">
              <div class="cd-val val-gradient-week" id="streakVal">0</div>
            </div>
          </div>
          <div class="ring-label">WEEK / STREAK</div>
        </div>

        <!-- RIGHT: Today ring & Countdown -->
        <div class="ring-col">
          <div style="width:140px; height:140px; position:relative;">
            <svg viewBox="0 0 140 140" class="dash-svg">
              <defs>
                <!-- VISIBLY CHANGING GRADIENT - NO GLOW -->
                <linearGradient id="todayGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                  <stop offset="0%">
                    <animate attributeName="stop-color" values="#00d0f4; #00d26a; #b058e8; #00d0f4" dur="3s" repeatCount="indefinite" />
                  </stop>
                  <stop offset="100%">
                    <animate attributeName="stop-color" values="#b058e8; #00d0f4; #00d26a; #b058e8" dur="3s" repeatCount="indefinite" />
                  </stop>
                </linearGradient>
              </defs>
              <circle cx="70" cy="70" r="54" class="ring-track" />
              <circle cx="70" cy="70" r="54" class="ring-prog" id="todayRingSvg" stroke="url(#todayGrad)" stroke-dasharray="339.29" stroke-dashoffset="339.29"/>
            </svg>
            <div class="center-display">
              <!-- DAYS LEFT (Clean Cream/White Gradient) -->
              <div class="cd-val val-gradient-today" id="cdDays">-- D</div>
            </div>
          </div>
          <div class="ring-label">TODAY</div>
        </div>

      </div>

      <div id="dmsg" class="dmsg glass-card">
        <div style="font-size:2.5rem; margin-bottom:10px;">🏆</div>
        <div class="dtl">Perfection.</div>
        <div class="ds">All subjects successfully completed today.</div>
      </div>
      
      <div id="tw"></div>
    </div>

    <!-- PROGRESS TAB -->
    <div class="view" id="vP"></div>

  </div>

  <div class="bnav">
    <button class="bb active" id="t0" onclick="switchTab(0)">
      <svg viewBox="0 0 24 24"><polyline points="3 12 8 12 12 4 16 20 20 12 23 12"></polyline></svg>
    </button>
    <button class="bb" id="t1" onclick="switchTab(1)">
      <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 4-6"/></svg>
    </button>
  </div>
</div>

function syncDim(dayIdx, val) {
  DB['dim_' + dayIdx] = val;
  save();
  document.querySelectorAll('.dim-input.day-' + dayIdx).forEach(el => {
      if(el.value !== val) el.value = val;
  });
}

var dI = 0;
var pre = false;

function init() {
  var now = new Date(); now.setHours(0,0,0,0);
  var s2 = new Date(DS); s2.setHours(0,0,0,0);
  var raw = Math.round((now - s2) / 86400000);
  pre = raw < 0; 
  dI = Math.max(0, Math.min(raw, TOTAL - 1));
  drawWeekRings();
}

function getDayTasks(idx) {
  if (idx < 0 || idx >= TOTAL) return [];
  var p = PLAN[idx];
  return SUBJECTS.map(function(s) {
    return { key: taskKey(idx, s.k), subj: s.k, tag: s.label, icon: s.icon, color: s.color, text: p[s.field] };
  });
}

function isDayComplete(idx) {
  var tasks = getDayTasks(idx);
  return tasks.length > 0 && tasks.every(function(t) { return !!DB[t.key]; });
}

function calcStreak() {
  var n = 0;
  for (var i = dI - 1; i >= 0; i--) { if (isDayComplete(i)) n++; else break; }
  if (isDayComplete(dI)) n++;
  return n;
}

function updateHero(done, total) {
  var pct = total > 0 ? (done / total) : 0;
  var circ = 339.29; 
  var offset = circ - (pct * circ);
  
  var ringSvg = document.getElementById('todayRingSvg');
  if(ringSvg) {
      ringSvg.style.strokeDashoffset = offset;
  }
  
  var n = calcStreak();
  var sVal = document.getElementById('streakVal');
  if (sVal) {
      sVal.textContent = n;
  }
}

function drawWeekRings() {
  var el = document.getElementById('weekNodesEl');
  if (!el) return;
  el.innerHTML = '';
  
  var rt = new Date(); rt.setHours(0,0,0,0);
  var dayOfWeek = rt.getDay(); 
  var currentDayIndex = dayOfWeek === 0 ? 6 : dayOfWeek - 1; 
  
  var diffToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  var sow = new Date(rt); sow.setDate(rt.getDate() + diffToMonday);
  var sn = new Date(DS); sn.setHours(0,0,0,0);
  
  for (var i = 0; i < 7; i++) {
    var d = new Date(sow); d.setDate(sow.getDate() + i);
    var act = d.getTime() === rt.getTime();
    var diff = Math.round((d - sn) / 86400000);
    var dn = diff >= 0 && diff < TOTAL && isDayComplete(diff);
    
    var angle = (i * (360/7)) - 90;
    var rad = angle * Math.PI / 180;
    var R = 54;
    var x = 70 + R * Math.cos(rad);
    var y = 70 + R * Math.sin(rad);
    
    var dx = Math.cos(rad) * 24; 
    var dy = Math.sin(rad) * 24;
    
    var node = document.createElement('div');
    node.className = 'day-node' + (act?' active':'') + (dn?' done':'');
    node.style.left = x + 'px';
    node.style.top = y + 'px';
    
    node.innerHTML = `
        <span class="date-val">${d.getDate()}</span>
        <span class="day-out" style="transform: translate(${dx}px, ${dy}px);">${DL[i]}</span>
    `;
    el.appendChild(node);
  }

  var circ = 339.29; 
  var fillLength = (currentDayIndex / 7) * circ;
  if (fillLength === 0) fillLength = 0.01; 
  var wkProgSvg = document.getElementById('wkProgSvg');
  if(wkProgSvg) {
      wkProgSvg.style.strokeDashoffset = circ - fillLength;
  }
}

function makeAccordionCard(t, dk, idx) {
  var c = document.createElement('div');
  c.className = 'workout-card theme-' + t.subj + (dk ? ' done' : '');
  c.id = 'card_' + t.key;
  c.style.animationDelay = (idx * 0.05) + 's';
  
  let displayText = t.text;
  if (t.subj === 'phy' && displayText.includes('[INPUT_BOX]')) {
      let savedVal = DB['dim_' + dI] || '';
      let inputHTML = `<input type="text" class="dim-input day-${dI}" value="${savedVal}" placeholder="e.g. 1-10" onclick="event.stopPropagation()" oninput="syncDim('${dI}', this.value)">`;
      displayText = displayText.replace('[INPUT_BOX]', inputHTML);
  }

  c.innerHTML = `

var _nft = null;
function toggleTask(key) {
  var card = document.getElementById('card_' + key);
  if (!card) return;
  var was = !!DB[key];
  if (was) { delete DB[key]; } else {
    DB[key] = true;
    if (navigator.vibrate) try { navigator.vibrate(14); } catch(e) {}
    if (typeof confetti === 'function') confetti({ particleCount:50, spread:70, startVelocity:25, origin:{y:.86}, colors:['#ff2a5f','#facc15','#00d26a','#00d0f4'], disableForReducedMotion:true });
  }
  save();
  card.classList.toggle('done', !was);
  if (!was) card.classList.remove('open'); 

  var tasks = getDayTasks(dI), d2 = 0;
  tasks.forEach(function(t) { if (DB[t.key]) d2++; });
  updateHero(d2, tasks.length);
  document.getElementById('dmsg').style.display = (d2 === tasks.length && tasks.length > 0) ? 'block' : 'none';

  clearTimeout(_nft);
  _nft = setTimeout(function() {
    var allCards = Array.from(document.querySelectorAll('.workout-card'));
    var next = allCards.find(function(c) { return !c.classList.contains('done'); });
    if (next) {
       var yOffset = -80; 
       var scrollEl = document.getElementById('mainAppScroll');
       var y = next.offsetTop + yOffset;
       if(scrollEl.scrollTo) {
           try{ scrollEl.scrollTo({top: y, behavior: 'smooth'}); }
           catch(e){ scrollEl.scrollTop = y; }
       } else {
           scrollEl.scrollTop = y;
       }
    }
  }, 400);
}

  var subjStats = SUBJECTS.map(function(s) {
    var cnt = 0;
    for (var i = 0; i < TOTAL; i++) { if (DB[taskKey(i, s.k)]) cnt++; }
    return { s: s, cnt: cnt, pct: Math.round(cnt / TOTAL * 100) };
  });

  var pctFill = '#f4f4f8', subFill = '#8a8a9d';

  var ringsHTML = subjStats.map(function(d) {
    return '<div class="subj-ring-card">' +
      '<svg class="prog-ring-svg" width="80" height="80" viewBox="0 0 80 80">' +
        '<circle class="prog-ring-track" cx="40" cy="40" r="36"/>' +
        '<circle class="prog-ring-arc" id="parc_' + d.s.k + '" cx="40" cy="40" r="36" stroke="' + d.s.color + '"/>' +
        '<text class="prog-ring-pct" x="40" y="34" fill="' + pctFill + '">' + d.pct + '%</text>' +
        '<text class="prog-ring-sub" x="40" y="50" fill="' + subFill + '">' + d.cnt + '/' + TOTAL + ' d</text>' +
      '</svg>' +
      '<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">' +
        '<span class="subj-ring-icon">' + d.s.icon + '</span>' +
        '<span class="subj-ring-name">' + d.s.label + '</span>' +
      '</div>' +
    '</div>';
  }).join('');

  var rt = new Date(); rt.setHours(0,0,0,0);
  var planHTML = PLAN.map(function(p, i) {
    var dayDate = new Date(DS); dayDate.setDate(DS.getDate() + i);
    var isToday = dayDate.getTime() === rt.getTime();
    var isFuture = dayDate > rt;
    var complete = isDayComplete(i);
    var cls = 'plan-day-card' + (complete ? ' completed' : '') + (isToday ? ' today-card' : '');
    var dateStr = dayDate.getDate() + ' ' + MN[dayDate.getMonth()];
    var statusStr = complete ? '✓ Done' : (isToday ? '📍 Today' : (isFuture ? dateStr : dateStr));
    
    // RENDER SYNCED INPUT BOX IN PLAN TAB AS WELL
    let savedVal = DB['dim_' + i] || '';
    let inputHTML = `<input type="text" class="dim-input day-${i}" value="${savedVal}" placeholder="e.g. 1-10" onclick="event.stopPropagation()" oninput="syncDim('${i}', this.value)">`;
    let safePhy = p.phy.replace('[INPUT_BOX]', inputHTML);

    return '<div class="' + cls + '" id="pday_' + i + '">' +
      '<div class="plan-day-header" onclick="togglePlanDay(' + i + ')">' +
        '<div class="plan-day-num">' + p.day + '</div>' +
        '<div style="flex:1;">' +
          '<div class="plan-day-title">Day ' + p.day + '</div>' +
          '<div class="plan-day-meta">' + dateStr + ' · ' + statusStr + '</div>' +
        '</div>' +
        '<svg class="plan-day-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>' +
      '</div>' +
      '<div class="plan-day-body" onclick="event.stopPropagation()">' +
        '<div class="plan-subject-row"><span class="plan-subj-badge badge-math">Math</span><span class="plan-subj-text">' + p.math + '</span></div>' +
        '<div class="plan-subject-row"><span class="plan-subj-badge badge-phy">Physics</span><span class="plan-subj-text">' + safePhy + '</span></div>' +
        '<div class="plan-subject-row"><span class="plan-subj-badge badge-che">Chem</span><span class="plan-subj-text">' + p.che + '</span></div>' +
        '<div class="plan-subject-row"><span class="plan-subj-badge badge-bio">Biology</span><span class="plan-subj-text">' + p.bio + '</span></div>' +
      '</div>' +
    '</div>';
  }).join('');

  document.getElementById('vP').innerHTML =
    '<div class="glass-card" style="padding:20px;">' +
      '<div class="prog-hero-top">' +
        '<div class="prog-hero-pct">' + ovPct + '%</div>' +
        '<div class="prog-hero-meta">' +
          '<div class="prog-hero-days">' + totalDone + ' / ' + TOTAL + '</div>' +
          '<div class="prog-hero-lbl">Completed</div>' +
        '</div>' +
      '</div>' +
      '<div class="prog-bar-wrap"><div class="prog-bar-fill" id="ovBar"></div></div>' +
    '</div>' +
    '<div class="sh" style="margin-top:0;">Subject Master</div>' +
    '<div class="subj-rings">' + ringsHTML + '</div>' +
    '<div class="sh">36-Day Strategy</div>' +
    '<div class="plan-section">' + planHTML + '</div>';

  requestAnimationFrame(function() { requestAnimationFrame(function() {
    var ob = document.getElementById('ovBar'); if (ob) ob.style.width = ovPct + '%';
    subjStats.forEach(function(d) {
      var arc = document.getElementById('parc_' + d.s.k);
      if (arc) arc.style.strokeDashoffset = CIRC * (1 - d.pct / 100);
    });
    var todayCard = document.querySelector('.plan-day-card.today-card');
    if (todayCard) {
      todayCard.classList.add('open');
      setTimeout(function() { todayCard.scrollIntoView({ behavior:'smooth', block:'center' }); }, 400);
    }
  }); });
}

function togglePlanDay(i) {
  var card = document.getElementById('pday_' + i);
  if (card) card.classList.toggle('open');
}

function switchTab(i) {
  ['vT','vP'].forEach(function(id){document.getElementById(id).classList.remove('active');});
  ['t0','t1'].forEach(function(id){document.getElementById(id).classList.remove('active');});
  
  var scrollEl = document.getElementById('mainAppScroll');
  if(scrollEl.scrollTo) {
     try{ scrollEl.scrollTo({ top: 0, behavior: 'smooth' }); }
     catch(e){ scrollEl.scrollTop = 0; }
  } else {
     scrollEl.scrollTop = 0;
  }

  if (i===0) { document.getElementById('vT').classList.add('active'); document.getElementById('t0').classList.add('active'); renderToday(); }
  else if (i===1) { document.getElementById('vP').classList.add('active'); document.getElementById('t1').classList.add('active'); renderProg(); }
}

function updateCountdown() {
  var dist = TARGET_DATE - Date.now();
  var cdDays = document.getElementById('cdDays'); if (!cdDays) return;
  if (dist < 0) { cdDays.innerHTML = "EXAM!"; return; }
  cdDays.innerHTML = Math.ceil(dist / 86400000) + 'D';
}

document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') { init(); if (document.getElementById('vT').classList.contains('active')) renderToday(); }
});

updateCountdown();
setInterval(updateCountdown, 60000); 
init();
switchTab(0);
</script>
</body>
</html>
